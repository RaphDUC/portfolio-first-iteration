<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Raphaël D. — Portfolio</title>
    <script>
      // GitHub Pages SPA redirect trick
      // Encodes the requested path as a query param and redirects to index.html
      // segmentCount = 1 for project pages (github.io/repo-name/...)
      var segmentCount = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.host +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
